<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meal Matrix - Professional Analytics Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        /* Custom scrollbar for premium table feel */
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen antialiased flex flex-col">
    
    <script>
        if (!localStorage.getItem('token')) {
            window.location.href = '/auth';
        }
    </script>
    
    <header class="border-b border-slate-200 bg-white/90 backdrop-blur-md sticky top-0 z-50 px-6 py-3.5 flex justify-between items-center shadow-sm">
        <div class="flex items-center space-x-3">
            <div class="h-9 w-9 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-100">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 002 2h2a2 2 0 002-2z"></path></svg>
            </div>
            <div>
                <h1 class="text-lg font-bold tracking-tight text-slate-900 leading-tight">Meal Matrix</h1>
                <p class="text-[10px] font-mono text-slate-400 uppercase tracking-widest">Enterprise Ledger Node</p>
            </div>
        </div>
        
        <div id="userInfo" class="flex items-center space-x-4">
            <div class="bg-slate-100 border border-slate-200/60 rounded-xl px-4 py-1.5 text-right hidden sm:block">
                <p class="text-xs text-slate-500 font-medium">Active Session</p>
                <p class="text-sm font-bold text-slate-900"><span id="activeUserName"></span> <span class="text-xs font-mono text-indigo-600 ml-1">(<span id="activeUserRate"></span> TK/Meal)</span></p>
            </div>
            <button onclick="logout()" class="bg-rose-50 text-rose-600 hover:bg-rose-100 px-4 py-2.5 rounded-xl transition-all duration-200 font-semibold text-xs border border-rose-100/80 tracking-wider uppercase">
                Logout
            </button>
        </div>
    </header>

    <main class="flex-1 max-w-[1600px] w-full mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
        
        <div class="lg:col-span-3 space-y-6">
            <div class="bg-white border border-slate-200/70 rounded-2xl p-5 shadow-sm">
                <div class="mb-5">
                    <div class="flex items-center space-x-2 mb-3">
                        <div class="p-1.5 bg-amber-50 text-amber-600 rounded-lg"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg></div>
                        <h3 class="text-xs font-bold text-slate-900 uppercase tracking-wider">Set System Rate</h3>
                    </div>
                    <div class="flex space-x-2">
                        <input type="number" id="updateUserRateInput" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2 text-sm text-slate-900 font-mono outline-none focus:border-indigo-500 focus:bg-white transition-all">
                        <button onclick="updatePersonalRate()" class="bg-slate-900 hover:bg-slate-800 text-white font-semibold px-4 rounded-xl text-xs transition-all duration-150 uppercase tracking-wider shadow-sm">Update</button>
                    </div>
                </div>

                <hr class="border-slate-100 my-4">

                <div>
                    <div class="flex items-center space-x-2 mb-3">
                        <div class="p-1.5 bg-indigo-50 text-indigo-600 rounded-lg"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg></div>
                        <h3 class="text-xs font-bold text-slate-900 uppercase tracking-wider">Daily Meal Logger</h3>
                    </div>
                    <div class="space-y-3.5">
                        <div>
                            <label class="block text-[11px] font-bold text-slate-400 mb-1 uppercase tracking-wide">Target Date</label>
                            <input type="date" id="mealDate" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-2.5 text-xs text-slate-900 outline-none focus:border-indigo-500 focus:bg-white transition-all font-mono font-semibold">
                        </div>
                        <div>
                            <label class="block text-[11px] font-bold text-slate-400 mb-1 uppercase tracking-wide">Meal Quantity</label>
                            <input type="number" id="mealCount" min="0" value="1" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-2.5 text-xs text-slate-900 outline-none focus:border-indigo-500 focus:bg-white transition-all font-mono font-semibold">
                        </div>
                        <button onclick="submitMealCount()" class="w-full mt-2 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold py-3 px-4 rounded-xl transition-all duration-200 shadow-md shadow-indigo-100 uppercase tracking-widest">
                            Commit Entry
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-5">
            <div class="bg-white border border-slate-200/70 rounded-2xl p-5 shadow-sm">
                <div class="flex justify-between items-center border-b border-slate-100 pb-3 mb-4">
                    <div class="flex items-center space-x-2">
                        <div class="p-1.5 bg-emerald-50 text-emerald-600 rounded-lg"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H3a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg></div>
                        <h3 class="text-xs font-bold text-slate-900 uppercase tracking-wider">Monthly Accounts List</h3>
                    </div>
                    <div class="flex items-center space-x-1.5">
                        <input type="month" id="summaryMonth" class="bg-slate-50 border border-slate-200 rounded-xl p-2 text-xs text-slate-900 font-mono font-semibold outline-none focus:border-indigo-500 transition-all">
                        <button onclick="fetchMonthlySummary()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-bold py-2 px-3 rounded-xl transition-all border border-slate-200/60">Process</button>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div class="bg-slate-50 border border-slate-100 rounded-xl p-3.5">
                        <div class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Total Expense</div>
                        <div id="summaryTotalCost" class="text-lg font-mono text-indigo-600 font-bold mt-0.5">0.00 TK</div>
                    </div>
                    <div class="bg-slate-50 border border-slate-100 rounded-xl p-3.5">
                        <div class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">System Meals</div>
                        <div id="summaryTotalMeals" class="text-lg font-mono text-emerald-600 font-bold mt-0.5">0</div>
                    </div>
                </div>

                <div class="overflow-x-auto custom-scrollbar border border-slate-100 rounded-xl max-h-[300px] overflow-y-auto">
                    <table class="w-full text-left text-xs whitespace-nowrap sticky-header">
                        <thead class="sticky top-0 bg-slate-50 shadow-sm z-10">
                            <tr class="text-[10px] font-bold uppercase text-slate-400 tracking-wider">
                                <th class="p-3 pl-4">Member Name</th>
                                <th class="p-3 text-center">Meals</th>
                                <th class="p-3 text-center">Rate</th>
                                <th class="p-3 text-right pr-4">Net Payable</th>
                            </tr>
                        </thead>
                        <tbody id="summaryTableBody" class="divide-y divide-slate-100 text-slate-600 font-medium">
                            <tr>
                                <td colspan="4" class="p-6 text-center text-slate-400 italic">Processing Application Data Layer...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="lg:col-span-4">
            <div class="bg-white border border-slate-200/70 rounded-2xl p-5 shadow-sm">
                <div class="flex items-center space-x-2 mb-4 border-b border-slate-100 pb-3">
                    <div class="p-1.5 bg-purple-50 text-purple-600 rounded-lg"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 3.055A9.003 9.003 0 1020.945 13H11V3.055z"></path></svg></div>
                    <h3 class="text-xs font-bold text-slate-900 uppercase tracking-wider">Cost Allocation Allocation</h3>
                </div>
                <div class="relative w-full h-[375px]">
                    <canvas id="analyticsChart"></canvas>
                </div>
            </div>
        </div>

    </main>

    <script>
        let token = localStorage.getItem('token') || '';
        let currentUser = JSON.parse(localStorage.getItem('user')) || null;
        let chartInstance = null;

        const todayStr = new Date().toISOString().split('T')[0];
        document.getElementById('mealDate').value = todayStr;
        document.getElementById('summaryMonth').value = todayStr.substring(0, 7);

        if (token && currentUser) {
            document.getElementById('activeUserName').innerText = currentUser.name;
            document.getElementById('activeUserRate').innerText = currentUser.fixedMealRate || 70;
            document.getElementById('updateUserRateInput').value = currentUser.fixedMealRate || 70;
            fetchMonthlySummary();
        }

        function logout() {
            localStorage.clear();
            window.location.href = '/auth';
        }

        async function updatePersonalRate() {
            const newRate = document.getElementById('updateUserRateInput').value;
            const response = await fetch('/api/user/update-rate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify({ fixedMealRate: newRate })
            });
            if(response.ok) {
                const data = await response.json();
                currentUser.fixedMealRate = data.fixedMealRate;
                localStorage.setItem('user', JSON.stringify(currentUser));
                document.getElementById('activeUserRate').innerText = data.fixedMealRate;
                alert("Your Fixed Meal Rate is updated.");
                fetchMonthlySummary();
            } else {
                alert("Failed to update rate.");
            }
        }

        async function submitMealCount() {
            const date = document.getElementById('mealDate').value;
            const count = document.getElementById('mealCount').value;

            const response = await fetch('/api/meals/request', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify({ date, count })
            });
            if(response.ok) {
                alert("Meal count successfully saved.");
                fetchMonthlySummary();
            } else {
                alert("Error inserting entry.");
            }
        }

        async function fetchMonthlySummary() {
            const month = document.getElementById('summaryMonth').value;
            const response = await fetch(`/api/summary/monthly?month=${month}`, {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            if(!response.ok) return;
            const data = await response.json();

            document.getElementById('summaryTotalCost').innerText = data.totalSystemExpense.toFixed(2) + ' TK';
            document.getElementById('summaryTotalMeals').innerText = data.totalSystemMeals;

            const tbody = document.getElementById('summaryTableBody');
            tbody.innerHTML = '';

            const chartLabels = [];
            const chartData = [];

            data.userCalculationSheet.forEach(row => {
                chartLabels.push(row.name);
                chartData.push(row.calculatedCost);

                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50/80 transition-colors duration-150";
                tr.innerHTML = `
                    <td class="p-3 pl-4">
                        <div class="font-semibold text-slate-900">${row.name}</div>
                        <div class="text-[10px] text-slate-400 font-mono">${row.email}</div>
                    </td>
                    <td class="p-3 text-center font-mono font-bold text-indigo-600">${row.totalMeals}</td>
                    <td class="p-3 text-center font-mono text-slate-400">${row.userFixedRate} TK</td>
                    <td class="p-3 text-right pr-4 font-mono text-emerald-600 font-bold">${row.calculatedCost} TK</td>
                `;
                tbody.appendChild(tr);
            });

            renderChart(chartLabels, chartData);
        }

        function renderChart(labels, data) {
            const ctx = document.getElementById('analyticsChart').getContext('2d');
            if(chartInstance) chartInstance.destroy();
            
            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Total Cost (TK)',
                        data: data,
                        backgroundColor: 'rgba(79, 70, 229, 0.08)',
                        borderColor: 'rgba(79, 70, 229, 1)',
                        borderWidth: 2,
                        borderRadius: 6,
                        borderSkipped: false,
                        barThickness: 24
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    indexAxis: 'y', // প্রফেশনাল লুকের জন্য হরিজন্টাল বার চার্ট (যাতে নাম লম্বা হলেও ডিজাইন না ভাঙে)
                    scales: {
                        x: {
                            grid: { color: '#f1f5f9' },
                            ticks: { color: '#64748b', font: { family: 'JetBrains Mono', size: 10 } }
                        },
                        y: {
                            grid: { display: false },
                            ticks: { color: '#1e293b', font: { weight: '600', size: 11 } }
                        }
                    },
                    plugins: { 
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#0f172a',
                            padding: 10,
                            titleFont: { family: 'Plus Jakarta Sans', size: 11 },
                            bodyFont: { family: 'JetBrains Mono', size: 11 },
                            borderRadius: 6
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
